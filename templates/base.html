<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog Platforma{% endblock %}</title>

    <!-- Bootstrap 5 & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome (Ikonkalar uchun) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* UMUMIY STILLAR */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #333;
            overflow-x: hidden;
            position: relative;
        }

        /* SICHQONCHA BILAN QIMIRLAYDIGAN FON (Nuqtali pattern) */
        .bg-pattern {
            position: fixed;
            top: -50px; left: -50px; right: -50px; bottom: -50px;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 35px 35px;
            z-index: -1;
            transition: transform 0.1s ease-out;
        }

        /* ZAMONAVIY NAVBAR STILLARI */
        .navbar {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            padding: 15px 0;
        }
        .navbar-brand {
            font-weight: 700;
            color: #0d6efd !important;
            letter-spacing: -0.5px;
        }
        .nav-link {
            font-weight: 500;
            color: #475569 !important;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #0d6efd !important;
            transform: translateY(-1px);
        }
        .user-badge {
            background-color: #eff6ff;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            color: #3b82f6;
            margin-right: 15px;
            border: 1px solid #dbeafe;
        }

        /* TUGMALAR UCHUN GLOBAL HOVER EFFEKT */
        .btn {
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .footer {
            background: transparent;
            padding: 40px 0;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <!-- Harakatlanuvchi orqa fon elementi -->
    <div class="bg-pattern" id="movingBg"></div>

    <!-- Zamonaviy Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top mb-5">
        <div class="container">
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-content="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-home me-1"></i> Asosiy</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center mt-3 mt-lg-0">
                    {% if request.user.is_authenticated %}
                        <span class="user-badge d-none d-md-inline">
                            <i class="fas fa-user-circle me-1"></i> {{ request.user.username }}
                        </span>
                        <a class="nav-link me-4" href="{% url 'profile' %}">Profil</a>
                        <a href="{% url 'logout' %}" class="btn btn-outline-danger px-4 py-2" style="border-radius: 10px; font-weight: 500;">
                            <i class="fas fa-sign-out-alt me-1"></i> Chiqish
                        </a>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-primary px-4 py-2 shadow-sm" style="border-radius: 10px; font-weight: 500;">
                            <i class="fas fa-sign-in-alt me-1"></i> Kirish
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Asosiy Kontent Maydoni -->
    <main class="container" style="position: relative; z-index: 1;">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <p class="text-secondary mb-0" style="font-size: 0.9rem;">&copy; Barcha huquqlar himoyalangan.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Sichqoncha harakatini tutuvchi JAVASCRIPT -->
    <script>
        document.addEventListener('mousemove', function(e) {
            const bg = document.getElementById('movingBg');
            const x = (window.innerWidth - e.pageX * 2) * 0.02;
            const y = (window.innerHeight - e.pageY * 2) * 0.02;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
