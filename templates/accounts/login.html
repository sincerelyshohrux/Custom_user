{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="w-100" style="max-width: 420px;">
        <!-- Animatsiya bilan chiquvchi auth-card -->
        <div class="card auth-card shadow-lg border-0" style="border-radius: 20px;">
            <div class="card-body p-4 p-md-5">

                <!-- Sarlavha va Zamonaviy Ikonka -->
                <div class="text-center mb-4 pb-2">
                    <div class="icon-box mx-auto mb-3">
                        <i class="fas fa-lock fa-lg text-white"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-1">Tizimga kirish</h3>
                    <p class="text-secondary mb-0">Xush kelibsiz! Akkauntingizga kiring</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <!-- Formadagi har bir inputni chiroyli chiqarish -->
                    <div class="login-form-wrapper">
                        {{ form.as_p }}
                    </div>

                    <!-- Tugma -->
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm action-btn">
                            <i class="fas fa-sign-in-alt me-2"></i>Kirish
                        </button>
                    </div>
                </form>

                <hr class="my-4 text-muted opacity-25">

                <!-- Ro'yxatdan o'tishga yo'llanma -->
                <div class="text-center">
                    <p class="text-secondary mb-1" style="font-size: 0.95rem;">Hali ro'yxatdan o'tmaganmisiz?</p>
                    <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color: #0d6efd;">
                        Ro'yxatdan o'tish <i class="fas fa-arrow-right ms-1" style="font-size: 0.8rem;"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Pastki yozuv -->
        <p class="text-center text-muted mt-4 small" style="font-size: 0.85rem;">
            &copy; 2026 Barcha huquqlar himoyalangan.
        </p>
    </div>
</div>

<style>
    /* 1. Kard animatsiyasi va soyasi */
    .auth-card {
        background: #ffffff;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05) !important;
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* 2. Markaziy Ikonka (Moviy-Havorang Gradient) */
    .icon-box {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 16px rgba(13, 110, 253, 0.25);
    }

    /* 3. Forma elementlari dizayni */
    .login-form-wrapper p {
        margin-bottom: 20px;
    }

    .login-form-wrapper label {
        display: block;
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
        font-size: 0.95rem;
    }

    .login-form-wrapper input {
        width: 100%;
        padding: 14px 18px;
        border: 1.5px solid #e2e8f0;
        border-radius: 12px;
        background-color: #f8fafc;
        color: #334155;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    /* Fokus effekti */
    .login-form-wrapper input:focus {
        border-color: #0d6efd;
        background-color: #ffffff;
        outline: none;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
    }

    /* Xatoliklar uchun stilar */
    .login-form-wrapper ul.errorlist {
        list-style-type: none;
        padding-left: 0;
        margin-top: 6px;
        margin-bottom: 0;
    }

    .login-form-wrapper ul.errorlist li {
        color: #ef4444; /* Qizil xato rangi */
        font-size: 0.85rem;
        font-weight: 500;
    }

    /* 4. Tugma interaktivligi */
    .action-btn {
        border-radius: 12px;
        font-weight: 600;
        padding: 12px 0;
        transition: all 0.3s ease;
    }

    .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(13, 110, 253, 0.2);
    }
</style>
{% endblock %}
